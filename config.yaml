# rtsp_trt pipeline config

model:
  engine: /home/omar/luna/rtsp_trt/models/yolov12m-face.engine
  # Max batch the engine was built for (trtexec --maxShapes). Pipeline warns
  # if you list more streams than this — rebuild the engine if you do.
  engine_max_batch: 10

detection:
  conf_threshold: 0.50
  nms_threshold: 0.45

# Add or remove entries freely. Everything else adapts.
# Supports: bare paths (/path/to/file.mp4), rtsp:// URIs
streams:
  - rtsp://admin123:admin123@192.168.100.114/stream1
  # - streams/test1.mp4
  # - streams/test2.mp4
  # - streams/test3.mp4
  # - streams/test4.mp4

fps_window: 30        # frames averaged for the FPS readout
batch_wait_us: 3000   # spin-wait budget when collecting a batch (µs)

tracker:
  enabled: true
  high_thresh: 0.50   # min confidence to enter the high-quality detection pool
  low_thresh: 0.10    # min confidence for the low-quality pool (stage-2 rescue)
  match_thresh: 0.50  # IoU threshold for stages 1 & 3 matching. Lower = a shifted/
                      # reappearing box still re-attaches to the same track instead of
                      # spawning a new ID. Raise toward 0.8 if distinct nearby objects
                      # start swapping IDs.
  refind_dist: 2.5    # how far (in box-radii) an object can reappear from where it was
                      # lost and still recover its ID. Re-association uses centre distance,
                      # not IoU, so a shifted return still matches. ~2.5 ≈ within one
                      # box-width. Raise to be more forgiving about reappearing elsewhere
                      # (risks grabbing a different nearby object); lower to be stricter.
  max_age: 90         # frames a lost track survives with no detection before its ID is
                      # dropped. ~3 s at 30 fps — how long you can be "fully out" and
                      # still keep your ID. Increase for longer persistence.
  min_hits: 3         # consecutive hits before a NEW track gets a visible ID. >1 stops
                      # transient detections during a turn from flashing a new ID.
                      # (Re-found tracks already have hits, so they reappear instantly.)
